<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GenAI Debug UI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f3f3f3;
            --bg-tertiary: #e8e8e8;
            --bg-hover: #d4d4d4;
            --border-color: #d4d4d4;
            --text-primary: #333333;
            --text-secondary: #6e6e6e;
            --accent: #0066b8;
            --accent-hover: #005a9e;
            --success: #107c10;
            --error: #d32f2f;
            --warning: #c19c00;
            --user-msg-bg: #e5f1fb;
            --assistant-msg-bg: #f5f5f5;
            --tool-msg-bg: #e8f4e8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .container {
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            padding: 8px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-title {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
        }

        .endpoint-info {
            display: flex;
            gap: 16px;
            font-size: 12px;
        }

        .endpoint-info span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .endpoint-info .label {
            color: var(--text-secondary);
        }

        .endpoint-info .value {
            color: var(--text-primary);
        }

        .view-tabs {
            display: flex;
            gap: 2px;
        }

        .view-tab {
            padding: 4px 12px;
            border: 1px solid var(--border-color);
            border-radius: 3px;
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-size: 12px;
            cursor: pointer;
            transition: background 0.15s ease;
        }

        .view-tab:hover {
            background: var(--bg-hover);
        }

        .view-tab.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #ffffff;
        }

        .main-container {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .left-panel {
            width: 320px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .thread-section {
            height: 50%;
            border-bottom: 1px solid var(--border-color);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .request-section {
            height: 50%;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .section-header {
            padding: 8px 12px;
            border-bottom: 1px solid var(--border-color);
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-tertiary);
            color: var(--text-secondary);
        }

        .count {
            background: var(--accent);
            padding: 1px 6px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 500;
            color: #ffffff;
        }

        .section-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .clear-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            border-radius: 3px;
            padding: 2px 8px;
            font-size: 10px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.15s ease;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .clear-btn:hover {
            background: var(--error);
            border-color: var(--error);
            color: #ffffff;
        }

        .clear-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .thread-list, .request-list {
            flex: 1;
            overflow-y: auto;
            padding: 4px;
            background: var(--bg-primary);
        }

        .thread-item {
            padding: 8px 12px;
            border-radius: 3px;
            margin-bottom: 2px;
            cursor: pointer;
            transition: background 0.15s ease;
            background: var(--bg-secondary);
            border: 1px solid transparent;
        }

        .thread-item:hover {
            background: var(--bg-hover);
        }

        .thread-item.active {
            background: #c8ddf2;
            border-color: var(--accent);
        }

        .thread-item.active .thread-title {
            color: #000000;
        }

        .thread-item.active .thread-meta {
            color: #333333;
        }

        .thread-title {
            font-size: 12px;
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-primary);
        }

        .thread-meta {
            font-size: 11px;
            color: var(--text-secondary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .thread-model {
            background: var(--bg-tertiary);
            padding: 1px 6px;
            border-radius: 3px;
            font-size: 10px;
            color: var(--text-secondary);
        }

        .thread-item.active .thread-model {
            background: rgba(255,255,255,0.15);
            color: #ffffff;
        }

        .request-item {
            padding: 6px 10px;
            border-radius: 3px;
            margin-bottom: 2px;
            cursor: pointer;
            transition: background 0.15s ease;
            background: var(--bg-secondary);
            border: 1px solid transparent;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .request-item:hover {
            background: var(--bg-hover);
        }

        .request-item.active {
            background: #c8ddf2;
            border-color: var(--accent);
        }

        .request-item.active .request-path {
            color: #000000;
        }

        .request-item.active .request-time {
            color: #333333;
        }

        .request-method {
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: 600;
            min-width: 40px;
            text-align: center;
            background: var(--accent);
            color: #ffffff;
        }

        .request-info {
            flex: 1;
            min-width: 0;
        }

        .request-path {
            font-size: 12px;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
        }

        .request-time {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 1px;
        }

        .request-status {
            font-size: 11px;
            font-weight: 500;
            min-width: 36px;
            text-align: right;
        }

        .request-status.success {
            color: var(--success);
        }

        .request-status.error {
            color: var(--error);
        }

        .right-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
            overflow: hidden;
            min-height: 0;
        }

        .right-content {
            flex: 1;
            padding: 16px;
            overflow: hidden;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }

        .chat-view, .raw-view {
            flex: 1;
            display: none;
            overflow: hidden;
            min-height: 0;
        }

        .chat-view.active, .raw-view.active {
            display: flex;
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            min-height: 0;
        }

        /* 可展开组件 - Expandable Component */
        .expandable-component {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            overflow: hidden;
            flex-shrink: 0;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .expandable-component:hover {
            border-color: var(--accent);
        }

        .expandable-component.expanded {
            border-color: var(--accent);
            box-shadow: 0 2px 8px rgba(0, 102, 184, 0.15);
        }

        .expandable-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
            background: var(--bg-tertiary);
            cursor: pointer;
            user-select: none;
            transition: background 0.2s ease;
        }

        .expandable-header:hover {
            background: var(--bg-hover);
        }

        .expandable-component.expanded .expandable-header {
            background: var(--accent);
        }

        .expandable-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            transition: color 0.2s ease;
        }

        .expandable-component.expanded .expandable-title {
            color: #ffffff;
        }

        .expandable-summary {
            font-size: 12px;
            color: var(--text-secondary);
            margin-left: 8px;
            font-weight: 400;
            transition: color 0.2s ease;
        }

        .expandable-component.expanded .expandable-summary {
            color: rgba(255, 255, 255, 0.8);
        }

        .expandable-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: var(--text-secondary);
            transition: color 0.2s ease;
        }

        .expandable-component.expanded .expandable-toggle {
            color: #ffffff;
        }

        .expandable-toggle-icon {
            font-size: 10px;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .expandable-component.expanded .expandable-toggle-icon {
            transform: rotate(180deg);
        }

        .expandable-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                        padding 0.3s ease,
                        opacity 0.3s ease;
            opacity: 0;
            background: var(--bg-primary);
        }

        .expandable-component.expanded .expandable-content {
            max-height: 2000px; /* 足够大以容纳所有内容 */
            opacity: 1;
            padding: 16px;
        }

        /* 系统提示词特定样式 */
        .system-prompt {
            composes: expandable-component;
        }

        .system-prompt-header {
            composes: expandable-header;
        }

        .system-prompt-title {
            composes: expandable-title;
        }

        .system-prompt-content {
            composes: expandable-content;
        }

        .system-prompt-label {
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* 复制提示样式 */
        .system-prompt-content {
            position: relative;
            cursor: pointer;
        }

        .copy-hint {
            position: absolute;
            top: 8px;
            right: 8px;
            background: var(--accent);
            color: #ffffff;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
            opacity: 0;
            transform: translateY(-4px);
            transition: opacity 0.2s ease, transform 0.2s ease;
            pointer-events: none;
            z-index: 10;
        }

        .system-prompt-content:hover .copy-hint {
            opacity: 1;
            transform: translateY(0);
        }

        .copy-hint.copied {
            opacity: 1;
            transform: translateY(0);
            background: var(--success);
        }

        .chat-message {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            max-width: 80%;
        }

        .chat-message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .chat-message.assistant {
            align-self: flex-start;
        }

        .chat-avatar {
            font-size: 16px;
            flex-shrink: 0;
            opacity: 0.7;
        }

        .chat-content {
            flex: 1;
            min-width: 0;
        }

        .chat-role-label {
            font-size: 11px;
            color: var(--text-secondary);
            margin-bottom: 4px;
            font-weight: 500;
        }

        .chat-message.user .chat-content {
            background: var(--user-msg-bg);
            padding: 10px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
        }

        /* 用户消息保留换行符 */
        .chat-message.user .chat-content > div:not(.markdown-body) {
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .chat-message.assistant .chat-content {
            background: var(--assistant-msg-bg);
            padding: 10px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
        }

        .chat-message.tool {
            align-self: flex-start;
        }

        .chat-message.tool .chat-content {
            background: var(--tool-msg-bg);
            padding: 10px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
        }

        .tool-call {
            margin-top: 6px;
            padding: 8px;
            background: var(--bg-primary);
            border-radius: 4px;
            font-size: 12px;
            border: 1px solid var(--border-color);
        }

        .tool-call-name {
            font-weight: 600;
            margin-bottom: 6px;
            color: #0451a5;
            font-size: 12px;
        }

        .tool-call-args {
            font-size: 12px;
            color: var(--text-primary);
            line-height: 1.5;
        }

        .tool-call-args .markdown-body {
            font-size: 12px;
            line-height: 1.5;
        }

        .tool-call-args pre.json-code {
            background: var(--bg-tertiary);
            padding: 8px;
            border-radius: 4px;
            overflow-x: auto;
            margin: 0;
        }

        /* Thinking block styles */
        .thinking-block {
            margin-bottom: 12px;
            padding: 10px;
            background: #f0f7ff;
            border-radius: 6px;
            border-left: 3px solid #4a9eff;
        }

        .thinking-label {
            font-size: 11px;
            font-weight: 600;
            color: #4a9eff;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .thinking-content {
            font-size: 13px;
            color: #555;
            line-height: 1.5;
            font-style: italic;
        }

        /* Tool call block styles */
        .tool-call-block {
            padding: 10px;
            background: #f5f5f5;
            border-radius: 6px;
            border: 1px solid #ddd;
        }

        .tool-call-name {
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
            font-size: 13px;
        }

        .tool-call-input {
            background: #fff;
            padding: 8px;
            border-radius: 4px;
            overflow-x: auto;
            margin: 0;
            font-size: 12px;
            border: 1px solid #e0e0e0;
        }

        /* Tool calls container */
        .tool-calls-container {
            margin-top: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* Tool results container */
        .tool-results-container {
            margin-top: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .tool-result-block {
            padding: 10px;
            background: #e8f5e9;
            border-radius: 6px;
            border: 1px solid #4caf50;
        }

        .tool-result-label {
            font-size: 11px;
            font-weight: 600;
            color: #4caf50;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .tool-result-content {
            background: #fff;
            padding: 12px;
            border-radius: 4px;
            overflow-x: auto;
            margin: 0;
            font-size: 12px;
            border: 1px solid #c8e6c9;
            max-height: 400px;
            overflow-y: auto;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .tool-result-content.json-formatted {
            background: #f8f9fa;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
        }

        .tool-result-content.text-formatted {
            white-space: normal;
            padding: 8px 12px;
        }

        .raw-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            min-height: 0;
        }

        .raw-section {
            background: var(--bg-secondary);
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .raw-section-header {
            padding: 8px 12px;
            border-bottom: 1px solid var(--border-color);
            font-size: 12px;
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }

        .raw-section-header span {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .raw-section-body {
            padding: 12px;
            max-height: none;
            overflow: visible;
            background: var(--bg-primary);
        }

        .raw-section-body.headers {
            max-height: none;
            overflow: visible;
        }

        /* 可展开的内容区域 */
        .expandable-section .raw-section-header {
            cursor: pointer;
            user-select: none;
        }

        .expandable-section .raw-section-header:hover {
            background: var(--bg-hover);
        }

        .expandable-section .expandable-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 600;
        }

        .expandable-section .expandable-summary {
            font-size: 11px;
            color: var(--text-secondary);
            font-weight: 400;
            margin-left: 4px;
        }

        .expandable-section.expanded .expandable-summary {
            display: none;
        }

        .expandable-section .expandable-toggle {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: var(--text-secondary);
        }

        .raw-section-body {
            max-height: none;
            overflow: visible;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), padding 0.3s ease, opacity 0.3s ease;
        }

        .raw-section-body.collapsed {
            max-height: 0;
            overflow: hidden;
            padding: 0 12px;
            opacity: 0;
        }

        .raw-section-body.expanded {
            max-height: none;
            padding: 12px;
            opacity: 1;
            overflow: visible;
        }

        .raw-code {
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.5;
            color: var(--text-primary);
            white-space: pre-wrap;
            word-break: break-all;
        }

        .raw-code .json-key {
            color: #0451a5;
        }

        .raw-code .json-string {
            color: #a31515;
        }

        .raw-code .json-number {
            color: #098658;
        }

        .raw-code .json-boolean {
            color: #0000ff;
        }

        .raw-code .json-null {
            color: #0000ff;
        }

        .header-container {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .header-row {
            display: flex;
            align-items: flex-start;
            padding: 4px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .header-name {
            font-weight: 500;
            color: #0451a5;
            min-width: 150px;
            flex-shrink: 0;
            padding-right: 12px;
        }

        .header-value {
            flex: 1;
            color: var(--text-primary);
            word-break: break-all;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 32px;
            margin-bottom: 12px;
            opacity: 0.5;
        }

        .empty-state-text {
            font-size: 13px;
            text-align: center;
        }

        /* Markdown styles */
        .markdown-body {
            line-height: 1.5;
            color: var(--text-primary);
        }

        .markdown-body h1, .markdown-body h2, .markdown-body h3, .markdown-body h4, .markdown-body h5, .markdown-body h6 {
            margin-top: 1.2em;
            margin-bottom: 0.4em;
            font-weight: 600;
            color: #0451a5;
        }

        .markdown-body h1 {
            font-size: 1.4em;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.2em;
        }

        .markdown-body h2 {
            font-size: 1.2em;
        }

        .markdown-body h3 {
            font-size: 1.1em;
        }

        .markdown-body p {
            margin-bottom: 0.8em;
        }

        .markdown-body ul, .markdown-body ol {
            padding-left: 1.5em;
            margin-bottom: 0.8em;
        }

        .markdown-body li {
            margin-bottom: 0.2em;
        }

        .markdown-body strong {
            font-weight: 600;
            color: #098658;
        }

        .markdown-body em {
            font-style: italic;
            color: var(--text-secondary);
        }

        .markdown-body code {
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 0.9em;
            padding: 0.15em 0.4em;
            margin: 0;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 3px;
            color: #a31515;
        }

        .markdown-body pre {
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 0.9em;
            padding: 12px;
            overflow: auto;
            line-height: 1.4;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            margin-bottom: 0.8em;
        }

        .markdown-body pre code {
            background: transparent;
            padding: 0;
            border: none;
            color: var(--text-primary);
        }

        .markdown-body blockquote {
            border-left: 3px solid var(--accent);
            padding-left: 0.8em;
            color: var(--text-secondary);
            margin-bottom: 0.8em;
        }

        .markdown-body a {
            color: #0451a5;
            text-decoration: none;
        }

        .markdown-body a:hover {
            text-decoration: underline;
        }

        .markdown-body table {
            border-collapse: collapse;
            margin-bottom: 0.8em;
            width: 100%;
        }

        .markdown-body th, .markdown-body td {
            border: 1px solid var(--border-color);
            padding: 6px 8px;
            text-align: left;
            font-size: 0.9em;
        }

        .markdown-body th {
            background: var(--bg-tertiary);
            font-weight: 600;
            color: var(--text-primary);
        }

        .markdown-body td {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }

        .markdown-body tr:hover td {
            background: var(--bg-hover);
        }

        /* 滚动条 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--bg-hover);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #a0a0a0;
        }

        /* 响应式设计 */
        @media (max-width: 1024px) {
            .left-panel {
                width: 280px;
            }
        }

        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
            }
            .left-panel {
                width: 100%;
                height: 40%;
                border-right: none;
                border-bottom: 1px solid var(--border-color);
            }
        }

        /* Token 使用量 Bar */
        .token-usage-bar {
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            padding: 8px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 12px;
            flex-shrink: 0;
        }

        .token-usage-label {
            color: var(--text-secondary);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .token-usage-stats {
            display: flex;
            gap: 24px;
            flex: 1;
            margin-left: 16px;
        }

        .token-stat {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .token-stat-label {
            color: var(--text-secondary);
            font-size: 11px;
        }

        .token-stat-value {
            color: var(--text-primary);
            font-weight: 600;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 11px;
        }

        .token-stat.input .token-stat-value {
            color: #0451a5;
        }

        .token-stat.output .token-stat-value {
            color: #098658;
        }

        .token-stat.total .token-stat-value {
            color: #a31515;
        }

        .token-progress {
            flex: 1;
            max-width: 300px;
            height: 20px;
            background: var(--bg-tertiary);
            border-radius: 3px;
            overflow: hidden;
            display: flex;
            position: relative;
        }

        .token-progress-input {
            height: 100%;
            background: #0451a5;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 4px;
            color: #ffffff;
            font-size: 10px;
            font-weight: 600;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            min-width: 0;
        }

        .token-progress-output {
            height: 100%;
            background: #098658;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding-left: 4px;
            color: #ffffff;
            font-size: 10px;
            font-weight: 600;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            min-width: 0;
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <header class="header">
        <div class="header-title">GenAI Debug UI</div>
        <div class="endpoint-info">
            <span><span class="label">Target:</span> <span class="value" id="endpoint">localhost:8888</span></span>
            <span><span class="label">Provider:</span> <span class="value" id="provider">bigmodel</span></span>
            <span><span class="label">Protocol:</span> <span class="value" id="protocol">-</span></span>
        </div>
        <div class="view-tabs">
            <button class="view-tab active" data-view="chat">Chat View</button>
            <button class="view-tab" data-view="raw">Raw Data</button>
        </div>
    </header>

    <!-- 主容器 -->
    <div class="main-container">
        <!-- 左侧区域 -->
        <div class="left-panel">
            <!-- Thread列表（左上） -->
            <div class="thread-section">
                <div class="section-header">
                    Threads
                    <div class="section-actions">
                        <button class="clear-btn" id="clear-threads-btn" onclick="clearAllThreads()" title="清空所有 Threads">
                            <span>🗑️</span>
                            <span>清空</span>
                        </button>
                        <span class="count" id="thread-count">0</span>
                    </div>
                </div>
                <div class="thread-list" id="thread-list">
                    <div class="empty-state">
                        <div class="empty-state-icon">💬</div>
                        <div class="empty-state-text">No threads yet</div>
                    </div>
                </div>
            </div>

            <!-- 请求记录（左下） -->
            <div class="request-section">
                <div class="section-header">
                    Requests
                    <span class="count" id="request-count">0</span>
                </div>
                <div class="request-list" id="request-list">
                    <div class="empty-state">
                        <div class="empty-state-icon">📡</div>
                        <div class="empty-state-text">Select a thread to view requests</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右侧区域 -->
        <div class="right-panel">
            <div class="right-content">
                <!-- 聊天 View -->
                <div class="chat-view active" id="chat-view">
                    <div class="chat-container" id="chat-container">
                        <div class="empty-state">
                            <div class="empty-state-icon">🤖</div>
                            <div class="empty-state-text">Select a request to view chat</div>
                        </div>
                    </div>
                </div>

                <!-- 原始数据 View -->
                <div class="raw-view" id="raw-view">
                    <div class="raw-container" id="raw-container">
                        <div class="empty-state">
                            <div class="empty-state-icon">📄</div>
                            <div class="empty-state-text">Select a request to view raw data</div>
                        </div>
                    </div>
                </div>
            </div>
            <!-- Token 使用量 Bar -->
            <div class="token-usage-bar" id="token-usage-bar" style="display: none;">
                <div class="token-usage-label">Token Usage</div>
                <div class="token-usage-stats">
                    <div class="token-stat input">
                        <span class="token-stat-label">Input:</span>
                        <span class="token-stat-value" id="token-input">0</span>
                    </div>
                    <div class="token-stat output">
                        <span class="token-stat-label">Output:</span>
                        <span class="token-stat-value" id="token-output">0</span>
                    </div>
                    <div class="token-stat total">
                        <span class="token-stat-label">Total:</span>
                        <span class="token-stat-value" id="token-total">0</span>
                    </div>
                </div>
                <div class="token-progress">
                    <div class="token-progress-input" id="token-progress-input" style="width: 0%"></div>
                    <div class="token-progress-output" id="token-progress-output" style="width: 0%"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/4.3.0/marked.min.js"></script>
    <script>
        // 全局状态
        let threads = [];
        let requests = [];
        let selectedThreadId = null;
        let selectedRequestId = null;
        
        // DOM 元素
        const threadListEl = document.getElementById('thread-list');
        const requestListEl = document.getElementById('request-list');
        const chatContainerEl = document.getElementById('chat-container');
        const rawContainerEl = document.getElementById('raw-container');
        const threadCountEl = document.getElementById('thread-count');
        const requestCountEl = document.getElementById('request-count');
        const endpointEl = document.getElementById('endpoint');
        const providerEl = document.getElementById('provider');
        const tokenUsageBar = document.getElementById('token-usage-bar');
        const tokenInputEl = document.getElementById('token-input');
        const tokenOutputEl = document.getElementById('token-output');
        const tokenTotalEl = document.getElementById('token-total');
        const tokenProgressInput = document.getElementById('token-progress-input');
        const tokenProgressOutput = document.getElementById('token-progress-output');
        
        // 初始化
        async function init() {
            loadInfo();
            loadRecords();
            setupSSE();
            setupViewTabs();
        }
        
        // 加载API信息
        async function loadInfo() {
            try {
                const response = await fetch('/api/info');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const result = await response.json();
                if (!result.success || !result.data || !result.data.provider) {
                    throw new Error('Invalid response format');
                }
                endpointEl.textContent = result.data.provider.targetHost;
                providerEl.textContent = result.data.provider.name;
            } catch (error) {
                console.error('Failed to load info:', error);
            }
        }
        
        // 加载记录
        async function loadRecords() {
            try {
                const response = await fetch('/api/records');
                const records = await response.json();
                processRecords(records);
            } catch (error) {
                console.error('Failed to load records:', error);
            }
        }
        
        // 处理记录，提取Threads和Requests
        function processRecords(records) {
            const threadMap = new Map();
            
            // 过滤掉favicon.ico请求
            records = records.filter(record => {
                const url = record.request?.url || '';
                return !url.includes('favicon.ico');
            });
            
            records.forEach(record => {
                // 优先使用服务器返回的threadId，否则提取
                const threadId = record.threadId || extractThreadId(record);
                
                if (!threadMap.has(threadId)) {
                    threadMap.set(threadId, {
                        id: threadId,
                        title: extractThreadTitle(record),
                        startTime: record.timestamp,
                        lastActiveTime: record.timestamp,
                        requestCount: 0,
                        model: extractModel(record)
                    });
                }
                
                const thread = threadMap.get(threadId);
                thread.requestCount++;
                if (new Date(record.timestamp) > new Date(thread.lastActiveTime)) {
                    thread.lastActiveTime = record.timestamp;
                }
                
                // 确保record有threadId
                record.threadId = threadId;
            });
            
            // 转换为数组并按时间倒序
            threads = Array.from(threadMap.values()).sort((a, b) => 
                new Date(b.lastActiveTime) - new Date(a.lastActiveTime)
            );
            
            requests = records.sort((a, b) => 
                new Date(b.timestamp) - new Date(a.timestamp)
            );
            
            renderThreads();
            updateCounts();
            
            // 自动选择最新的thread和最新的request
            if (threads.length > 0 && !selectedThreadId) {
                selectedThreadId = threads[0].id;
                renderThreads();
                renderRequests();
                
                // 选择该thread中最新的request
                const threadRequests = requests.filter(r => r.threadId === selectedThreadId);
                if (threadRequests.length > 0) {
                    selectedRequestId = threadRequests[0].id;
                    renderRequests();
                    renderRequestDetail();
                }
            }
        }
        
        // 提取消息内容文本（支持多模态消息）
        function extractMessageContent(content) {
            if (!content) return '';
            if (typeof content === 'string') return content;
            if (Array.isArray(content)) {
                return content
                    .filter(item => item.type === 'text' && item.text)
                    .map(item => item.text)
                    .join('');
            }
            return '';
        }
        
        // 将 Anthropic 格式的 content 数组转换为 HTML（包含 thinking、tool_use 和 tool_result）
        function formatContentArrayToHtml(content, isUser = false) {
            if (!content) return '';
            if (typeof content === 'string') return content;
            if (!Array.isArray(content)) return '';
            
            let html = '';
            let thinkingContent = '';
            let textContent = '';
            const toolCalls = [];
            const toolResults = [];
            
            content.forEach(item => {
                if (item.type === 'text' && item.text) {
                    textContent += item.text;
                } else if (item.type === 'thinking' && item.thinking) {
                    thinkingContent += item.thinking;
                } else if (item.type === 'tool_use') {
                    toolCalls.push({
                        id: item.id,
                        name: item.name,
                        input: item.input
                    });
                } else if (item.type === 'tool_result') {
                    // Tool result 包含工具执行结果
                    toolResults.push({
                        toolUseId: item.tool_use_id,
                        content: item.content
                    });
                }
            });
            
            // 构建 HTML
            if (thinkingContent) {
                html += `<div class="thinking-block"><div class="thinking-label">💭 Thinking</div><div class="thinking-content">${escapeHtml(thinkingContent)}</div></div>`;
            }
            if (textContent) {
                html += textContent;
            }
            if (toolCalls.length > 0) {
                html += '<div class="tool-calls-container">';
                toolCalls.forEach(tool => {
                    html += `<div class="tool-call-block"><div class="tool-call-name">🔧 ${escapeHtml(tool.name)}</div><pre class="tool-call-input">${syntaxHighlight(JSON.stringify(tool.input, null, 2))}</pre></div>`;
                });
                html += '</div>';
            }
            if (toolResults.length > 0) {
                html += '<div class="tool-results-container">';
                toolResults.forEach(result => {
                    // Tool result 的 content 可能是数组或字符串
                    let resultContent = '';
                    let isJson = false;
                    
                    if (Array.isArray(result.content)) {
                        // 提取所有 text 类型的内容
                        const textParts = result.content
                            .filter(c => c.type === 'text' && c.text)
                            .map(c => c.text);
                        resultContent = textParts.join('\n');
                    } else if (typeof result.content === 'string') {
                        resultContent = result.content;
                    } else {
                        resultContent = JSON.stringify(result.content, null, 2);
                        isJson = true;
                    }
                    
                    // 尝试解析为 JSON 进行语法高亮
                    let formattedContent = '';
                    if (!isJson) {
                        try {
                            const parsed = JSON.parse(resultContent);
                            formattedContent = syntaxHighlight(JSON.stringify(parsed, null, 2));
                            isJson = true;
                        } catch (e) {
                            // 不是 JSON，按纯文本处理
                            formattedContent = escapeHtml(resultContent);
                        }
                    } else {
                        formattedContent = syntaxHighlight(resultContent);
                    }
                    
                    // 根据内容类型选择显示方式
                    let contentHtml = '';
                    if (isJson) {
                        contentHtml = `<pre class="tool-result-content json-formatted">${formattedContent}</pre>`;
                    } else if (resultContent.includes('\n') || resultContent.length > 100) {
                        // 多行或长文本使用 pre 标签
                        contentHtml = `<pre class="tool-result-content">${formattedContent}</pre>`;
                    } else {
                        // 短文本使用普通 div
                        contentHtml = `<div class="tool-result-content text-formatted">${formattedContent}</div>`;
                    }
                    
                    html += `<div class="tool-result-block"><div class="tool-result-label">📤 Tool Result</div>${contentHtml}</div>`;
                });
                html += '</div>';
            }
            
            return html;
        }
        
        // 提取Thread ID
        function extractThreadId(record) {
            try {
                if (record.request.body) {
                    const body = JSON.parse(record.request.body);
                    // 使用第一条用户消息的content作为thread标识（跳过system消息）
                    if (body.messages && body.messages.length > 0) {
                        const firstUserMsg = body.messages.find(msg => msg.role === 'user');
                        if (firstUserMsg && firstUserMsg.content) {
                            const text = extractMessageContent(firstUserMsg.content);
                            if (text) {
                                return 'thread_' + hashString(text.substring(0, 50));
                            }
                        }
                    }
                }
            } catch (e) {}
            return 'thread_' + record.id.split('_')[1];
        }
        
        // 提取Thread标题（取第一条用户消息，跳过system）
        function extractThreadTitle(record) {
            try {
                if (record.request.body) {
                    const body = JSON.parse(record.request.body);
                    if (body.messages && body.messages.length > 0) {
                        // 找第一条用户消息
                        const firstUserMsg = body.messages.find(msg => msg.role === 'user');
                        if (firstUserMsg && firstUserMsg.content) {
                            let content = extractMessageContent(firstUserMsg.content);
                            if (content) {
                                // 过滤掉 HTML 标签
                                content = content.replace(/<[^>]*>/g, '');
                                // 过滤掉 system-reminder 等系统标记
                                content = content.replace(/<system-reminder>.*?<\/system-reminder>/gs, '');
                                // 去除多余空白
                                content = content.trim();
                                // 如果过滤后为空，使用默认标题
                                if (!content) {
                                    return 'Chat ' + new Date(record.timestamp).toLocaleTimeString();
                                }
                                return content.substring(0, 60) + (content.length > 60 ? '...' : '');
                            }
                        }
                    }
                }
            } catch (e) {}
            return 'Chat ' + new Date(record.timestamp).toLocaleTimeString();
        }
        
        // 提取模型
        function extractModel(record) {
            try {
                if (record.request.body) {
                    const body = JSON.parse(record.request.body);
                    return body.model || 'unknown';
                }
            } catch (e) {}
            return 'unknown';
        }
        
        // 简单的字符串哈希
        function hashString(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                const char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return Math.abs(hash).toString(36).substring(0, 8);
        }
        
        // 渲染Thread列表
        function renderThreads() {
            if (threads.length === 0) {
                threadListEl.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">💬</div>
                        <div class="empty-state-text">No threads yet</div>
                    </div>
                `;
                return;
            }
            
            threadListEl.innerHTML = threads.map(thread => `
                <div class="thread-item ${thread.id === selectedThreadId ? 'active' : ''}" 
                     data-thread-id="${thread.id}">
                    <div class="thread-title">${escapeHtml(thread.title)}</div>
                    <div class="thread-meta">
                        <span>${formatTime(thread.lastActiveTime)}</span>
                        <span class="thread-model">${thread.model}</span>
                    </div>
                </div>
            `).join('');
            
            // 绑定点击事件
            threadListEl.querySelectorAll('.thread-item').forEach(item => {
                item.addEventListener('click', () => {
                    selectedThreadId = item.dataset.threadId;
                    renderThreads();
                    renderRequests();
                    
                    // 自动选择该thread中最新的request并显示其chat view
                    const threadRequests = requests.filter(r => r.threadId === selectedThreadId);
                    if (threadRequests.length > 0) {
                        // requests已经按时间倒序排列，第一个就是最新的
                        selectedRequestId = threadRequests[0].id;
                        renderRequests();
                        renderRequestDetail();
                    } else {
                        selectedRequestId = null;
                        clearRightPanel();
                    }
                });
            });
        }
        
        // 渲染请求列表
        function renderRequests() {
            if (!selectedThreadId) {
                requestListEl.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📡</div>
                        <div class="empty-state-text">Select a thread to view requests</div>
                    </div>
                `;
                return;
            }
            
            const threadRequests = requests.filter(r => r.threadId === selectedThreadId);
            
            if (threadRequests.length === 0) {
                requestListEl.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📡</div>
                        <div class="empty-state-text">No requests in this thread</div>
                    </div>
                `;
                return;
            }
            
            requestListEl.innerHTML = threadRequests.map(req => {
                const method = req.request.method || 'GET';
                let title = '';
                try {
                    // 提取最后一条用户消息作为标题
                    if (req.request.body) {
                        const body = JSON.parse(req.request.body);
                        if (body.messages && body.messages.length > 0) {
                            // 找最后一条用户消息
                            for (let i = body.messages.length - 1; i >= 0; i--) {
                                if (body.messages[i].role === 'user') {
                                    const content = extractMessageContent(body.messages[i].content);
                                    if (content) {
                                        title = content.substring(0, 50) + (content.length > 50 ? '...' : '');
                                    }
                                    break;
                                }
                            }
                        }
                    }
                } catch (e) {}
                
                // 如果没有提取到消息，使用URL路径
                if (!title) {
                    try {
                        title = new URL(req.request.url).pathname;
                    } catch (e) {
                        title = req.request.url || '';
                    }
                }
                
                const status = req.response?.statusCode || 0;
                const statusClass = status >= 200 && status < 300 ? 'success' : 'error';
                
                return `
                    <div class="request-item ${req.id === selectedRequestId ? 'active' : ''}" 
                         data-request-id="${req.id}">
                        <span class="request-method ${method.toLowerCase()}">${method}</span>
                        <div class="request-info">
                            <div class="request-path">${escapeHtml(title)}</div>
                            <div class="request-time">${formatTime(req.timestamp)} · ${req.duration}ms</div>
                        </div>
                        <span class="request-status ${statusClass}">${status}</span>
                    </div>
                `;
            }).join('');
            
            // 绑定点击事件
            requestListEl.querySelectorAll('.request-item').forEach(item => {
                item.addEventListener('click', () => {
                    selectedRequestId = item.dataset.requestId;
                    renderRequests();
                    renderRequestDetail();
                });
            });
            
            requestCountEl.textContent = threadRequests.length;
        }
        
        // 渲染请求详情
        function renderRequestDetail() {
            if (!selectedRequestId) return;
            
            const request = requests.find(r => r.id === selectedRequestId);
            if (!request) return;
            
            // 更新顶部 provider 信息
            updateEndpointInfo(request);
            
            renderChatView(request);
            renderRawView(request);
            updateTokenUsage(request);
        }
        
        // 更新顶部 endpoint 信息
        function updateEndpointInfo(request) {
            const endpointEl = document.getElementById('endpoint');
            const providerEl = document.getElementById('provider');
            const protocolEl = document.getElementById('protocol');
            
            if (request) {
                // 从 transformedUrl 中提取目标主机
                if (request.transformedUrl) {
                    try {
                        const url = new URL(request.transformedUrl);
                        endpointEl.textContent = url.hostname;
                    } catch (e) {
                        endpointEl.textContent = 'unknown';
                    }
                } else {
                    endpointEl.textContent = 'unknown';
                }
                
                // 获取 provider 名称并格式化显示
                const providerName = request.provider || 'unknown';
                providerEl.textContent = formatProviderName(providerName);
                
                // 显示协议类型
                const protocol = request.protocol || 'openai';
                protocolEl.textContent = protocol.toUpperCase();
            } else {
                // 恢复默认值
                endpointEl.textContent = 'localhost:8888';
                providerEl.textContent = 'bigmodel';
                protocolEl.textContent = '-';
            }
        }
        
        // 格式化 provider 名称显示
        function formatProviderName(providerName) {
            const nameMap = {
                'bigmodel_openai': '智谱AI (OpenAI兼容)',
                'bigmodel_anthropic': '智谱AI (Anthropic协议)',
                'openai': 'OpenAI',
                'anthropic': 'Anthropic',
                'default': 'Default'
            };
            return nameMap[providerName] || providerName;
        }
        
        // 渲染聊天View
        function renderChatView(request) {
            try {
                const protocol = request.protocol || 'openai';
                const body = JSON.parse(request.request.body || '{}');
                const response = parseResponseBody(request.response?.body, protocol);
                
                let systemPrompt = '';
                
                let messages = [];
                
                // 提取系统提示词并过滤掉
                // 支持两种格式：
                // 1. OpenAI 格式：messages 数组中包含 role: 'system' 的消息
                // 2. Anthropic 格式：system 字段（数组或字符串）
                if (body.system) {
                    // Anthropic 格式：system 可以是数组或字符串
                    if (Array.isArray(body.system)) {
                        // system 是数组，提取所有 text 类型的内容
                        systemPrompt = body.system
                            .filter(item => item.type === 'text' && item.text)
                            .map(item => item.text)
                            .join('\n');
                    } else if (typeof body.system === 'string') {
                        // system 是字符串
                        systemPrompt = body.system;
                    }
                }
                
                if (body.messages) {
                    body.messages.forEach(msg => {
                        if (msg.role === 'system') {
                            // OpenAI 格式：累加系统提示词
                            const sysContent = extractMessageContent(msg.content);
                            systemPrompt = systemPrompt ? systemPrompt + '\n' + sysContent : sysContent;
                        } else {
                            // 处理 assistant 和 user 消息的 Anthropic 格式 content 数组
                            let content = msg.content;
                            if (Array.isArray(content)) {
                                // 将 content 数组转换为 HTML（包含 thinking、tool_use、tool_result）
                                content = formatContentArrayToHtml(content, msg.role === 'user');
                            }
                            messages.push({
                                role: msg.role,
                                content: content,
                                toolCalls: msg.tool_calls, // 添加 tool_calls 支持
                                timestamp: request.timestamp
                            });
                        }
                    });
                }
                
                // 添加AI回复（根据协议类型）
                if (protocol === 'anthropic') {
                    // Anthropic 协议：从 content 数组提取
                    if (response.content && response.content.length > 0) {
                        // 提取所有类型的内容
                        let textContent = '';
                        let thinkingContent = '';
                        const toolCalls = [];
                        
                        response.content.forEach(c => {
                            if (c.type === 'text' && c.text) {
                                textContent += c.text;
                            } else if (c.type === 'thinking' && c.thinking) {
                                thinkingContent += c.thinking;
                            } else if (c.type === 'tool_use') {
                                toolCalls.push({
                                    id: c.id,
                                    name: c.name,
                                    input: c.input
                                });
                            }
                        });
                        
                        // 构建完整内容：thinking + text + tool_calls（全部作为 assistant 消息的一部分）
                        let fullContent = '';
                        if (thinkingContent) {
                            fullContent += `<div class="thinking-block"><div class="thinking-label">💭 Thinking</div><div class="thinking-content">${escapeHtml(thinkingContent)}</div></div>`;
                        }
                        if (textContent) {
                            fullContent += textContent;
                        }
                        // 将 tool_use 内容也合并到 assistant 消息中
                        if (toolCalls.length > 0) {
                            fullContent += '<div class="tool-calls-container">';
                            toolCalls.forEach(tool => {
                                fullContent += `<div class="tool-call-block"><div class="tool-call-name">🔧 ${escapeHtml(tool.name)}</div><pre class="tool-call-input">${syntaxHighlight(JSON.stringify(tool.input, null, 2))}</pre></div>`;
                            });
                            fullContent += '</div>';
                        }
                        
                        messages.push({
                            role: 'assistant',
                            content: fullContent,
                            toolCalls: toolCalls.length > 0 ? toolCalls : null,
                            timestamp: request.timestamp
                        });
                    }
                } else {
                    // OpenAI 协议：从 choices 数组提取
                    if (response.choices && response.choices[0]) {
                        const choice = response.choices[0];
                        messages.push({
                            role: 'assistant',
                            content: choice.message?.content || '',
                            toolCalls: choice.message?.tool_calls,
                            timestamp: request.timestamp
                        });
                    }
                }
                
                // 系统提示词HTML - 可展开组件
                let systemPromptHtml = '';
                if (systemPrompt) {
                    const isExpanded = localStorage.getItem('systemPromptExpanded') === 'true';
                    // 生成摘要（前100个字符）
                    const summary = systemPrompt.substring(0, 100).replace(/\n/g, ' ') + (systemPrompt.length > 100 ? '...' : '');
                    // 使用Markdown渲染系统提示词
                    let systemPromptContentHtml = '';
                    if (typeof marked !== 'undefined') {
                        try {
                            marked.setOptions({
                                breaks: true,
                                gfm: true,
                                headerIds: true,
                                mangle: false
                            });
                            systemPromptContentHtml = marked.parse(systemPrompt);
                        } catch (e) {
                            console.error('System prompt markdown parsing error:', e);
                            systemPromptContentHtml = escapeHtml(systemPrompt);
                        }
                    } else {
                        systemPromptContentHtml = escapeHtml(systemPrompt);
                    }
                    systemPromptHtml = `
                        <div class="system-prompt expandable-component ${isExpanded ? 'expanded' : ''}" id="system-prompt">
                            <div class="system-prompt-header expandable-header" onclick="toggleExpandable('system-prompt', 'systemPromptExpanded')">
                                <div class="system-prompt-title expandable-title">
                                    <span>💡</span>
                                    <span>System Prompt</span>
                                    <span class="expandable-summary">${escapeHtml(summary)}</span>
                                </div>
                                <div class="expandable-toggle">
                                    <span>${isExpanded ? '收起' : '展开'}</span>
                                    <span class="expandable-toggle-icon">▼</span>
                                </div>
                            </div>
                            <div class="system-prompt-content expandable-content" onclick="copySystemPrompt(this)" title="点击复制系统提示词">
                                <div class="copy-hint">📋 点击复制</div>
                                <div class="markdown-body">${systemPromptContentHtml}</div>
                            </div>
                        </div>
                    `;
                }
                
                chatContainerEl.innerHTML = systemPromptHtml + messages.map(msg => {
                    const avatar = msg.role === 'user' ? '👤' : msg.role === 'tool' ? '🔧' : '🤖';
                    const roleLabel = msg.role === 'user' ? 'User' : msg.role === 'tool' ? 'Tool' : 'Assistant';
                    
                    let toolCallsHtml = '';
                    if (msg.toolCalls && msg.toolCalls.length > 0) {
                        console.log('[Debug] Processing toolCalls:', msg.toolCalls);
                        toolCallsHtml = msg.toolCalls.map(tc => {
                            const funcName = tc.function?.name || tc.name || 'unknown';
                            let funcArgs = tc.function?.arguments || tc.arguments || '';
                            
                            // 如果没有参数，不显示此 tool-call
                            if (!funcArgs || funcArgs === '{}' || funcArgs === '') {
                                return '';
                            }
                            
                            // 尝试解析 JSON 并提取 result 字段进行 Markdown 渲染
                            let argsHtml = '';
                            try {
                                const parsed = JSON.parse(funcArgs);
                                if (parsed.result) {
                                    // 如果有 result 字段，渲染为 Markdown
                                    if (typeof marked !== 'undefined') {
                                        argsHtml = `<div class="markdown-body">${marked.parse(parsed.result)}</div>`;
                                    } else {
                                        argsHtml = escapeHtml(parsed.result);
                                    }
                                } else {
                                    // 否则显示格式化的 JSON
                                    argsHtml = `<pre class="json-code">${syntaxHighlight(JSON.stringify(parsed, null, 2))}</pre>`;
                                }
                            } catch (e) {
                                // 如果不是 JSON，直接显示原始内容
                                argsHtml = escapeHtml(funcArgs);
                            }
                            
                            return `
                                <div class="tool-call">
                                    <div class="tool-call-name">🔧 ${funcName}</div>
                                    <div class="tool-call-args">${argsHtml}</div>
                                </div>
                            `;
                        }).filter(html => html !== '').join('');
                    }
                    
                    // 处理内容（支持多模态消息）
                    let content = extractMessageContent(msg.content);
                    let contentHtml = '';

                    // assistant 和 tool 角色的消息使用 Markdown 渲染
                    if ((msg.role === 'assistant' || msg.role === 'tool') && typeof marked !== 'undefined') {
                        try {
                            // 配置 marked 以启用所有功能
                            marked.setOptions({
                                breaks: true,
                                gfm: true,
                                headerIds: true,
                                mangle: false
                            });
                            contentHtml = marked.parse(content);
                        } catch (e) {
                            console.error('Markdown parsing error:', e);
                            contentHtml = escapeHtml(content);
                        }
                    } else {
                        // 用户消息：清理 HTML 标签后显示
                        // 移除 HTML 标签，但在块级元素后添加换行
                        let cleanedContent = content
                            .replace(/<\/?(div|p|br|pre|li|ul|ol|h[1-6]|blockquote|section|article|header|footer|main|aside|nav)[^>]*>/gi, '\n')
                            .replace(/<[^>]*>/g, '');
                        // 移除转义的 HTML 实体
                        cleanedContent = cleanedContent.replace(/&lt;[^&]*&gt;/g, '');
                        // 移除行号标记（如 "1→", "2→" 等）
                        cleanedContent = cleanedContent.replace(/^\s*\d+→/gm, '');
                        // 移除多余的空白和空行
                        cleanedContent = cleanedContent
                            .split('\n')
                            .map(line => line.trim())
                            .filter((line, i, arr) => line || (i > 0 && arr[i-1]))
                            .join('\n')
                            .trim();
                        
                        // 用户消息也使用 Markdown 渲染
                        if (typeof marked !== 'undefined') {
                            try {
                                marked.setOptions({
                                    breaks: true,
                                    gfm: true,
                                    headerIds: true,
                                    mangle: false
                                });
                                contentHtml = marked.parse(cleanedContent);
                            } catch (e) {
                                console.error('Markdown parsing error:', e);
                                contentHtml = escapeHtml(cleanedContent);
                            }
                        } else {
                            contentHtml = escapeHtml(cleanedContent);
                        }
                    }

                    // 判断是否需要添加 markdown-body 类（所有消息都使用 Markdown 渲染）
                    const useMarkdownClass = 'markdown-body';

                    // 只有当有内容或工具调用时才显示消息体
                    const hasContent = content && content.trim();
                    const hasToolCalls = msg.toolCalls && msg.toolCalls.length > 0;

                    return `
                        <div class="chat-message ${msg.role}">
                            <div class="chat-avatar">${avatar}</div>
                            <div class="chat-content">
                                <div class="chat-role-label">${roleLabel}</div>
                                ${hasContent ? `<div class="${useMarkdownClass}">${contentHtml}</div>` : ''}
                                ${hasToolCalls ? toolCallsHtml : ''}
                            </div>
                        </div>
                    `;
                }).join('');
                
                // 滚动到底部
                chatContainerEl.scrollTop = chatContainerEl.scrollHeight;
            } catch (e) {
                chatContainerEl.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">⚠️</div>
                        <div class="empty-state-text">Failed to parse chat data</div>
                    </div>
                `;
            }
        }
        
        // 渲染原始数据View
        function renderRawView(request) {
            try {
                const protocol = request.protocol || 'openai';
                const requestBody = formatJson(request.request.body, protocol);
                const responseBody = formatJson(request.response?.body, protocol);
                
                // 使用转发后的headers，如果没有则使用原始headers
                const headers = request.transformedHeaders || request.request.headers;
                let requestHeaders = '';
                if (headers) {
                    // 按字母顺序排序 headers
                    requestHeaders = Object.entries(headers)
                        .sort(([keyA], [keyB]) => keyA.toLowerCase().localeCompare(keyB.toLowerCase()))
                        .map(([key, value]) => {
                            return `
                            <div class="header-row">
                                <div class="header-name">${escapeHtml(key)}</div>
                                <div class="header-value">${escapeHtml(String(value))}</div>
                            </div>
                        `;
                        }).join('');
                }
                
                let pathName = '';
                try {
                    pathName = new URL(request.request.url).pathname;
                } catch (e) {
                    pathName = request.request.url || '';
                }
                
                // 获取保存的展开状态
                const requestExpanded = localStorage.getItem('rawRequestExpanded') === 'true';
                const responseExpanded = localStorage.getItem('rawResponseExpanded') === 'true';

                rawContainerEl.innerHTML = `
                    <div class="raw-section">
                        <div class="raw-section-body headers">
                            <div class="header-container">${requestHeaders}</div>
                        </div>
                    </div>
                    <div class="raw-section expandable-section ${requestExpanded ? 'expanded' : ''}" id="request-section" data-storage-key="rawRequestExpanded">
                        <div class="raw-section-header expandable-header" onclick="toggleRawSection('request-section')">
                            <div class="expandable-title">
                                <span>📤</span>
                                <span>Request</span>
                                <span class="expandable-summary">${escapeHtml(pathName)}</span>
                            </div>
                            <div class="expandable-toggle">
                                <span>${requestExpanded ? '收起' : '展开'}</span>
                                <span class="expandable-toggle-icon" style="transform: ${requestExpanded ? 'rotate(0deg)' : 'rotate(-90deg)'};">▼</span>
                            </div>
                        </div>
                        <div class="raw-section-body ${requestExpanded ? 'expanded' : 'collapsed'}">
                            <div class="raw-code">${requestBody}</div>
                        </div>
                    </div>
                    <div class="raw-section expandable-section ${responseExpanded ? 'expanded' : ''}" id="response-section" data-storage-key="rawResponseExpanded">
                        <div class="raw-section-header expandable-header" onclick="toggleRawSection('response-section')">
                            <div class="expandable-title">
                                <span>📥</span>
                                <span>Response</span>
                                <span class="expandable-summary">${request.response?.statusCode || 0} ${request.response?.statusMessage || ''}</span>
                            </div>
                            <div class="expandable-toggle">
                                <span>${responseExpanded ? '收起' : '展开'}</span>
                                <span class="expandable-toggle-icon" style="transform: ${responseExpanded ? 'rotate(0deg)' : 'rotate(-90deg)'};">▼</span>
                            </div>
                        </div>
                        <div class="raw-section-body ${responseExpanded ? 'expanded' : 'collapsed'}">
                            <div class="raw-code">${responseBody}</div>
                        </div>
                    </div>
                `;
            } catch (e) {
                console.error('renderRawView error:', e);
                rawContainerEl.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">⚠️</div>
                        <div class="empty-state-text">Failed to render raw data: ${escapeHtml(e.message)}</div>
                    </div>
                `;
            }
        }
        
        // 格式化JSON（支持普通JSON和SSE流式格式，SSE会合并为完整JSON）
        function formatJson(jsonStr, protocol = 'openai') {
            if (!jsonStr) return '';
            
            // 检查是否为SSE格式，合并为完整JSON
            // SSE格式可能是 "data:" 或 "event:" 开头
            if (jsonStr.startsWith('data:') || jsonStr.startsWith('event:')) {
                const merged = parseResponseBody(jsonStr, protocol);
                return syntaxHighlight(JSON.stringify(merged, null, 2));
            }
            
            // 普通JSON格式
            try {
                const json = JSON.parse(jsonStr);
                return syntaxHighlight(JSON.stringify(json, null, 2));
            } catch (e) {
                return escapeHtml(String(jsonStr));
            }
        }
        
        // JSON语法高亮
        function syntaxHighlight(json) {
            json = escapeHtml(json);
            return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function (match) {
                let cls = 'json-number';
                if (/^"/.test(match)) {
                    if (/:$/.test(match)) {
                        cls = 'json-key';
                    } else {
                        cls = 'json-string';
                    }
                } else if (/true|false/.test(match)) {
                    cls = 'json-boolean';
                } else if (/null/.test(match)) {
                    cls = 'json-null';
                }
                return '<span class="' + cls + '">' + match + '</span>';
            });
        }
        
        // 清空右侧面板
        function clearRightPanel() {
            chatContainerEl.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">🤖</div>
                    <div class="empty-state-text">Select a request to view chat</div>
                </div>
            `;
            rawContainerEl.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">📄</div>
                    <div class="empty-state-text">Select a request to view raw data</div>
                </div>
            `;
            tokenUsageBar.style.display = 'none';
        }

        // 解析 OpenAI 格式的响应体（支持普通JSON和SSE流式格式）
        function parseOpenAIResponse(body) {
            if (!body) return {};

            // 检查是否为SSE格式
            if (body.startsWith('data:')) {
                const result = {
                    choices: [],
                    usage: null
                };
                const lines = body.split('\n');
                let fullContent = '';
                let toolCalls = [];

                for (const line of lines) {
                    const trimmed = line.trim();
                    if (trimmed.startsWith('data:') && trimmed !== 'data: [DONE]') {
                        try {
                            const jsonStr = trimmed.substring(5).trim();
                            const data = JSON.parse(jsonStr);

                            // 收集流式内容
                            if (data.choices && data.choices[0]) {
                                const delta = data.choices[0].delta;
                                if (delta) {
                                    // 收集文本内容
                                    if (delta.content) {
                                        fullContent += delta.content;
                                    }
                                    // 收集工具调用
                                    if (delta.tool_calls) {
                                        delta.tool_calls.forEach((tc, index) => {
                                            if (!toolCalls[index]) {
                                                toolCalls[index] = {
                                                    id: tc.id || '',
                                                    type: tc.type || 'function',
                                                    function: { name: '', arguments: '' }
                                                };
                                            }
                                            if (tc.function) {
                                                if (tc.function.name) {
                                                    toolCalls[index].function.name += tc.function.name;
                                                }
                                                if (tc.function.arguments) {
                                                    toolCalls[index].function.arguments += tc.function.arguments;
                                                }
                                            }
                                        });
