                                    }
                                }
                                // 保存最后一个choice的结构
                                if (!result.choices[0]) {
                                    result.choices[0] = { message: { content: '', role: 'assistant' } };
                                }
                            }

                            // 收集usage信息（通常在最后一个SSE事件中）
                            if (data.usage) {
                                result.usage = data.usage;
                            }
                        } catch (e) {
                            // 忽略解析错误
                        }
                    }
                }

                // 设置完整内容
                if (result.choices[0]) {
                    result.choices[0].message = { content: fullContent, role: 'assistant' };
                    // 添加工具调用（如果有）
                    if (toolCalls.length > 0) {
                        result.choices[0].message.tool_calls = toolCalls;
                    }
                }

                return result;
            }

            // 普通JSON格式
            try {
                return JSON.parse(body);
            } catch (e) {
                return {};
            }
        }

        // 解析 Anthropic 格式的响应体（支持普通JSON和SSE流式格式）
        function parseAnthropicResponse(body) {
            if (!body) return {};

            // 检查是否为SSE格式（支持 "data:" 或 "event:" 开头）
            if (body.startsWith('data:') || body.startsWith('event:')) {
                const result = {
                    id: '',
                    type: 'message',
                    role: 'assistant',
                    model: '',
                    content: [],
                    usage: null
                };
                const lines = body.split('\n');
                let contentBlocks = [];

                for (const line of lines) {
                    const trimmed = line.trim();
                    // 解析 data: 行
                    if (trimmed.startsWith('data:')) {
                        const jsonStr = trimmed.substring(5).trim();
                        if (jsonStr === '[DONE]') continue;
                        
                        try {
                            const data = JSON.parse(jsonStr);

                            // 处理 message_start 事件
                            if (data.type === 'message_start' && data.message) {
                                result.id = data.message.id || '';
                                result.model = data.message.model || '';
                                result.role = data.message.role || 'assistant';
                                if (data.message.content) {
                                    contentBlocks = data.message.content;
                                }
                            }

                            // 处理 content_block_start 事件
                            if (data.type === 'content_block_start' && data.index !== undefined) {
                                const idx = data.index;
                                if (data.content_block) {
                                    contentBlocks[idx] = { ...data.content_block };
                                    // 根据类型初始化字段
                                    if (data.content_block.type === 'text') {
                                        contentBlocks[idx].text = '';
                                    } else if (data.content_block.type === 'thinking') {
                                        contentBlocks[idx].thinking = '';
                                    } else if (data.content_block.type === 'tool_use') {
                                        // tool_use 的 input 可能是对象或字符串，初始化为空对象
                                        contentBlocks[idx].input = {};
                                    }
                                }
                            }

                            // 处理 content_block_delta 事件
                            if (data.type === 'content_block_delta' && data.index !== undefined) {
                                const idx = data.index;
                                if (!contentBlocks[idx]) {
                                    contentBlocks[idx] = { type: 'text', text: '' };
                                }
                                if (data.delta) {
                                    // 处理 text 类型的 delta
                                    if (data.delta.type === 'text_delta' && data.delta.text) {
                                        contentBlocks[idx].text = (contentBlocks[idx].text || '') + data.delta.text;
                                    } else if (data.delta.text) {
                                        contentBlocks[idx].text = (contentBlocks[idx].text || '') + data.delta.text;
                                    }
                                    
                                    // 处理 thinking 类型的 delta
                                    if (data.delta.type === 'thinking_delta' && data.delta.thinking) {
                                        contentBlocks[idx].thinking = (contentBlocks[idx].thinking || '') + data.delta.thinking;
                                    } else if (data.delta.thinking) {
                                        contentBlocks[idx].thinking = (contentBlocks[idx].thinking || '') + data.delta.thinking;
                                    }
                                    
                                    // 处理 tool_use 类型的 delta (input_json_delta)
                                    if (data.delta.type === 'input_json_delta' && data.delta.partial_json) {
                                        // partial_json 是累积的 JSON 字符串片段
                                        if (!contentBlocks[idx]._partialInput) {
                                            contentBlocks[idx]._partialInput = '';
                                        }
                                        contentBlocks[idx]._partialInput += data.delta.partial_json;
                                        try {
                                            // 尝试解析累积的 JSON
                                            contentBlocks[idx].input = JSON.parse(contentBlocks[idx]._partialInput);
                                        } catch (e) {
                                            // JSON 还不完整，继续累积
                                        }
                                    }
                                }
                            }

                            // 处理 message_delta 事件（包含 usage）
                            if (data.type === 'message_delta' && data.usage) {
                                result.usage = {
                                    prompt_tokens: data.usage.input_tokens || 0,
                                    completion_tokens: data.usage.output_tokens || 0,
                                    total_tokens: (data.usage.input_tokens || 0) + (data.usage.output_tokens || 0)
                                };
                            }

                            // 兼容旧格式：直接在 data 中有 usage
                            if (data.usage && !result.usage) {
                                result.usage = {
                                    prompt_tokens: data.usage.input_tokens || 0,
                                    completion_tokens: data.usage.output_tokens || 0,
                                    total_tokens: (data.usage.input_tokens || 0) + (data.usage.output_tokens || 0)
                                };
                            }
                        } catch (e) {
                            // 忽略解析错误
                        }
                    }
                }

                // 设置完整内容 - 过滤掉稀疏数组中的空槽，并清理临时字段
                const filteredBlocks = contentBlocks
                    .filter(block => block !== undefined && block !== null)
                    .map(block => {
                        // 删除临时字段 _partialInput
                        if (block._partialInput !== undefined) {
                            delete block._partialInput;
                        }
                        return block;
                    });
                if (filteredBlocks.length > 0) {
                    result.content = filteredBlocks;
                }

                return result;
            }

            // 普通JSON格式
            try {
                const parsed = JSON.parse(body);
                // 转换 Anthropic usage 格式为统一格式
                if (parsed.usage) {
                    parsed.usage = {
                        prompt_tokens: parsed.usage.input_tokens,
                        completion_tokens: parsed.usage.output_tokens,
                        total_tokens: (parsed.usage.input_tokens || 0) + (parsed.usage.output_tokens || 0)
                    };
                }
                return parsed;
            } catch (e) {
                return {};
            }
        }

        // 解析响应体（根据协议类型选择解析逻辑）
        function parseResponseBody(body, protocol = 'openai') {
            if (protocol === 'anthropic') {
                return parseAnthropicResponse(body);
            }
            return parseOpenAIResponse(body);
        }

        // 更新 Token 使用量
        function updateTokenUsage(request) {
            try {
                const protocol = request.protocol || 'openai';
                const response = parseResponseBody(request.response?.body, protocol);
                const usage = response.usage;
                
                if (!usage) {
                    tokenUsageBar.style.display = 'none';
                    return;
                }
                
                const inputTokens = usage.prompt_tokens || 0;
                const outputTokens = usage.completion_tokens || 0;
                const totalTokens = usage.total_tokens || 0;
                
                tokenInputEl.textContent = inputTokens.toLocaleString();
                tokenOutputEl.textContent = outputTokens.toLocaleString();
                tokenTotalEl.textContent = totalTokens.toLocaleString();
                
                // 计算进度条比例
                const inputBarPercent = totalTokens > 0 ? (inputTokens / totalTokens) * 100 : 0;
                const outputBarPercent = totalTokens > 0 ? (outputTokens / totalTokens) * 100 : 0;
                
                tokenProgressInput.style.width = `${inputBarPercent}%`;
                tokenProgressOutput.style.width = `${outputBarPercent}%`;
                tokenProgressInput.textContent = `${inputBarPercent.toFixed(1)}%`;
                tokenProgressOutput.textContent = `${outputBarPercent.toFixed(1)}%`;
                
                tokenUsageBar.style.display = 'flex';
            } catch (e) {
                console.error('updateTokenUsage error:', e);
                tokenUsageBar.style.display = 'none';
            }
        }
        
        // 设置View切换
        function setupViewTabs() {
            const viewTabs = document.querySelectorAll('.view-tab');
            const chatView = document.getElementById('chat-view');
            const rawView = document.getElementById('raw-view');
            
            viewTabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    // 移除所有active类
                    viewTabs.forEach(t => t.classList.remove('active'));
                    chatView.classList.remove('active');
                    rawView.classList.remove('active');
                    
                    // 添加active类到当前tab和对应view
                    tab.classList.add('active');
                    const view = tab.dataset.view;
                    if (view === 'chat') {
                        chatView.classList.add('active');
                    } else if (view === 'raw') {
                        rawView.classList.add('active');
                    }
                    
                    // 如果已经选择了请求，重新渲染对应视图
                    if (selectedRequestId) {
                        const request = requests.find(r => r.id === selectedRequestId);
                        if (request) {
                            if (view === 'chat') {
                                renderChatView(request);
                            } else if (view === 'raw') {
                                renderRawView(request);
                            }
                        }
                    }
                });
            });
        }
        
        // 设置SSE
        let eventSource = null;
        let sseReconnectTimeout = null;
        let isPageVisible = true;
        
        // 页面可见性变化处理
        document.addEventListener('visibilitychange', () => {
            isPageVisible = !document.hidden;
            if (isPageVisible && (!eventSource || eventSource.readyState === EventSource.CLOSED)) {
                console.log('Page visible, reconnecting SSE...');
                setupSSE();
            }
        });
        
        // 页面卸载前清理连接
        window.addEventListener('beforeunload', () => {
            if (eventSource) {
                eventSource.close();
                eventSource = null;
            }
            if (sseReconnectTimeout) {
                clearTimeout(sseReconnectTimeout);
                sseReconnectTimeout = null;
            }
        });
        
        function setupSSE() {
            // 如果已存在连接且处于打开状态，不需要重新连接
            if (eventSource && eventSource.readyState === EventSource.OPEN) {
                return;
            }
            
            // 如果已存在连接，先关闭
            if (eventSource) {
                eventSource.close();
                eventSource = null;
            }
            
            try {
                eventSource = new EventSource('/api/events');
                
                eventSource.onopen = () => {
                    console.log('SSE connection opened');
                    // 清除重连定时器
                    if (sseReconnectTimeout) {
                        clearTimeout(sseReconnectTimeout);
                        sseReconnectTimeout = null;
                    }
                };
                
                eventSource.onmessage = (event) => {
                    try {
                        // 忽略心跳消息
                        if (event.data.includes('"type":"heartbeat"')) {
                            return;
                        }
                        
                        const record = JSON.parse(event.data);
                        
                        // 忽略连接成功消息
                        if (record.type === 'connected') {
                            console.log('SSE:', record.message);
                            return;
                        }
                        
                        processRecords([record, ...requests]);
                        
                        // 如果当前选中的thread有新请求，刷新请求列表
                        if (selectedThreadId && record.threadId === selectedThreadId) {
                            renderRequests();
                        }
                    } catch (error) {
                        console.error('Failed to parse SSE data:', error);
                    }
                };
                
                eventSource.onerror = (error) => {
                    // 只在连接真正出错时记录错误
                    if (eventSource && eventSource.readyState === EventSource.CLOSED) {
                        console.log('SSE connection closed');
                    }
                    
                    // 关闭当前连接
                    if (eventSource) {
                        eventSource.close();
                        eventSource = null;
                    }
                    
                    // 页面可见且没有重连计划时才重连
                    if (isPageVisible && !sseReconnectTimeout) {
                        sseReconnectTimeout = setTimeout(() => {
                            console.log('Attempting to reconnect SSE...');
                            setupSSE();
                            sseReconnectTimeout = null;
                        }, 5000);
                    }
                };
            } catch (error) {
                console.error('Failed to setup SSE:', error);
            }
        }
        
        // 更新计数
        function updateCounts() {
            threadCountEl.textContent = threads.length;
        }
        
        // 格式化时间
        function formatTime(timestamp) {
            const date = new Date(timestamp);
            return date.toLocaleTimeString('zh-CN', { 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit' 
            });
        }
        
        // 切换可展开组件状态
        function toggleExpandable(elementId, storageKey) {
            const element = document.getElementById(elementId);
            if (element) {
                const isExpanded = element.classList.contains('expanded');
                if (isExpanded) {
                    element.classList.remove('expanded');
                } else {
                    element.classList.add('expanded');
                }
                const newState = !isExpanded;
                if (storageKey) {
                    localStorage.setItem(storageKey, newState);
                }
                // 更新按钮文字
                const toggleText = element.querySelector('.expandable-toggle span:first-child');
                if (toggleText) {
                    toggleText.textContent = newState ? '收起' : '展开';
                }
            }
        }

        // 复制系统提示词到剪贴板
        async function copySystemPrompt(element) {
            // 阻止事件冒泡，避免触发其他点击事件
            event.stopPropagation();

            // 获取原始系统提示词文本（从 data 属性或重新解析）
            const systemPrompt = element.dataset.originalText || element.textContent.replace('📋 点击复制', '').trim();

            try {
                await navigator.clipboard.writeText(systemPrompt);
                showCopyFeedback(element, '✅ 已复制');
            } catch (err) {
                // 降级方案
                const textArea = document.createElement('textarea');
                textArea.value = systemPrompt;
                textArea.style.position = 'fixed';
                textArea.style.left = '-9999px';
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    showCopyFeedback(element, '✅ 已复制');
                } catch (e) {
                    showCopyFeedback(element, '❌ 复制失败');
                }
                document.body.removeChild(textArea);
            }
        }

        // 显示复制反馈
        function showCopyFeedback(element, message) {
            const hint = element.querySelector('.copy-hint');
            if (hint) {
                const originalText = hint.textContent;
                hint.textContent = message;
                hint.classList.add('copied');
                setTimeout(() => {
                    hint.textContent = originalText;
                    hint.classList.remove('copied');
                }, 2000);
            }
        }

        // 清空所有 Threads
        async function clearAllThreads() {
            const btn = document.getElementById('clear-threads-btn');

            // 确认对话框
            if (!confirm('确定要清空所有 Threads 吗？此操作不可恢复。')) {
                return { success: false, message: '用户取消操作' };
            }

            try {
                // 禁用按钮防止重复点击
                if (btn) {
                    btn.disabled = true;
                    btn.innerHTML = '<span>⏳</span><span>清空中...</span>';
                }

                // 1. 调用后端 API 清空服务器数据
                let response;
                try {
                    // 首先尝试 DELETE 方法
                    response = await fetch('/api/records', { method: 'DELETE' });
                } catch (e) {
                    // 如果 DELETE 失败，尝试 POST 方法
                    console.log('[Clear] DELETE failed, trying POST...');
                    response = await fetch('/api/records/clear', { 
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' }
                    });
                }

                // 检查响应状态
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`服务器错误 (${response.status}): ${errorText || '未知错误'}`);
                }

                // 检查内容类型
                const contentType = response.headers.get('content-type');
                if (!contentType || !contentType.includes('application/json')) {
                    const text = await response.text();
                    throw new Error(`服务器返回非 JSON 数据: ${text.substring(0, 100)}`);
                }

                const result = await response.json();

                if (!result.success) {
                    throw new Error(result.message || '清空服务器数据失败');
                }

                // 2. 清空前端 threads 数组
                threads = [];

                // 3. 清空前端 requests 数组
                requests = [];

                // 4. 重置选中状态
                selectedThreadId = null;
                selectedRequestId = null;

                // 5. 清除 localStorage 中的相关状态
                localStorage.removeItem('systemPromptExpanded');
                localStorage.removeItem('systemPromptCollapsed');
                localStorage.removeItem('rawRequestExpanded');
                localStorage.removeItem('rawResponseExpanded');

                // 6. 重新渲染界面
                renderThreads();
                renderRequests();
                clearRightPanel();
                updateCounts();

                // 7. 恢复按钮状态
                if (btn) {
                    btn.disabled = false;
                    btn.innerHTML = '<span>🗑️</span><span>清空</span>';
                }

                console.log('✅ 所有 Threads 已清空，共清除', result.clearedCount, '条记录');
                return { success: true, message: 'Threads 清空成功', clearedCount: result.clearedCount };

            } catch (error) {
                console.error('❌ 清空 Threads 失败:', error);

                // 恢复按钮状态
                if (btn) {
                    btn.disabled = false;
                    btn.innerHTML = '<span>🗑️</span><span>清空</span>';
                }

                alert('清空失败: ' + error.message);
                return { success: false, message: error.message, error };
            }
        }

        // 格式化 XML 内容，在标签之间添加换行
        function formatXmlContent(content) {
            if (!content) return '';
            // 在 XML 结束标签和开始标签之间添加换行
            // 匹配模式: </tag><tag> 或 </tag> 后紧跟 <
            return content
                .replace(/>(<\/[^>]+>)</g, '>\n$1<')  // 在标签之间添加换行
                .replace(/(<\/[^>]+>)(<[^/][^>]*>)/g, '$1\n\n$2')  // 在结束标签和开始标签之间添加空行
                .replace(/^(<[^>]+>)/gm, '$1')  // 保持标签缩进
                .trim();
        }

        // 切换 Raw 数据区域的展开/折叠
        function toggleRawSection(sectionId) {
            const section = document.getElementById(sectionId);
            if (section) {
                const body = section.querySelector('.raw-section-body');
                const icon = section.querySelector('.expandable-toggle-icon');
                const toggleText = section.querySelector('.expandable-toggle span:first-child');
                const storageKey = section.dataset.storageKey;

                if (body) {
                    const isExpanded = body.classList.contains('expanded');

                    if (isExpanded) {
                        body.classList.remove('expanded');
                        body.classList.add('collapsed');
                    } else {
                        body.classList.remove('collapsed');
                        body.classList.add('expanded');
                    }

                    const newState = !isExpanded;

                    // 更新图标旋转
                    if (icon) {
                        icon.style.transform = newState ? 'rotate(0deg)' : 'rotate(-90deg)';
                    }

                    // 更新按钮文字
                    if (toggleText) {
                        toggleText.textContent = newState ? '收起' : '展开';
                    }

                    // 保存状态到 localStorage
                    if (storageKey) {
                        localStorage.setItem(storageKey, newState);
                    }
                }
            }
        }

        // HTML转义
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 初始化
        init();
    </script>
</body>
